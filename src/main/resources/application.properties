spring.config.import=optional:file:.env[.properties]

server.port=${PORT:8081}
spring.application.name=usuario-service

# MySQL
spring.datasource.url=${DB_USUARIO_URL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.sql.init.mode=always

# JWT — el mismo secret debe estar en los 4 servicios
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Gmail SMTP — Usa contraseña de aplicación de Google (no la contraseña normal)
# Brevo HTTP API — no usa SMTP, evita bloqueos de Railway Hobby
brevo.api.key=${BREVO_API_KEY:}
mail.from=${MAIL_FROM:kidcare@kidcare.com}

# true = imprime tokens en consola (dev), false = envia emails reales (prod)
mail.dev-mode=${MAIL_DEV_MODE:false}
