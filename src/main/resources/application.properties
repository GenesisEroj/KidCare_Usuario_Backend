server.port=8081
spring.application.name=usuario-service

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/db_usuario?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=kidcare123

# JPA / Hibernate — update crea las tablas si no existen, no borra datos
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true

# data.sql con datos iniciales se ejecuta en cada arranque
spring.sql.init.mode=always

# JWT
jwt.secret=kidcare-secret-key-2024-segura-32chars
jwt.expiration=86400000

# Gmail SMTP — reemplaza con tu correo y contrasena de aplicacion de Google
# Para obtener la contrasena de aplicacion: Google Account > Seguridad > Verificacion en 2 pasos > Contrasenas de aplicacion
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=TU_CORREO@gmail.com
spring.mail.password=TU_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
